version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    - gfortran   # required to compile libkriging.so
  jobs:
    pre_build:
      # Build the Fortran shared library so the gallery examples can execute.
      - make OPENMP=0 libkriging

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false
